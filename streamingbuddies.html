// ── Log Modal ──────────────────────────────────────────────────
function buildModal() {
  // Type chips
  document.getElementById('type-chips').innerHTML = ['movie','tv'].map(t =>
    `<button class="chip ${t===S.modalType?'active':''}" onclick="setModalType('${t}')">${TYPE_LABELS[t]}</button>`
  ).join('');

  // Status chips — dynamic based on type + format
  renderStatusChips();

  // Stars
  document.getElementById('star-input').innerHTML = [1,2,3,4,5].map(n =>
    `<button class="star-btn" onclick="setModalRating(${n})" id="star-${n}" style="color:${n<=S.modalRating?'#C8A96E':'#ddd'}">★</button>`
  ).join('');
}

function openModal(prefill = '') {
  if (prefill) document.getElementById('modal-title-input').value = prefill;
  document.getElementById('modal-overlay').classList.add('open');
  checkSubmit();
  setTimeout(() => document.getElementById('modal-title-input').focus(), 100);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  clearWordSummary();
}

function setModalType(t) {
  S.modalType = t;
  document.querySelectorAll('#type-chips .chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('#type-chips .chip').forEach((c, i) => {
    if (['movie','tv'][i] === t) c.classList.add('active');
  });
  S.modalStatus = 'finished';
  renderStatusChips();
}

function setModalStatus(s) {
  S.modalStatus = s;
  document.querySelectorAll('#status-chips .chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('#status-chips .chip').forEach((c) => {
    if (c.dataset.value === s) c.classList.add('active');
  });
}

function renderStatusChips() {
  const opts = getStatusOptions(S.modalType);
  if (!opts.find(o => o.value === S.modalStatus)) {
    S.modalStatus = opts[0].value;
  }
  document.getElementById('status-chips').innerHTML = opts.map(o =>
    `<button class="chip ${o.value===S.modalStatus?'active':''}" data-value="${o.value}" onclick="setModalStatus('${o.value}')">${o.label}</button>`
  ).join('');
}

function setModalRating(n) {
  S.modalRating = n;
  [1,2,3,4,5].forEach(i => {
    const el = document.getElementById('star-'+i);
    if (el) el.style.color = i <= n ? '#C8A96E' : '#ddd';
  });
}









function enforceOneWord(input) {
  // Strip spaces so each box holds exactly one word
  input.value = input.value.replace(/\s+/g, '');
  updateWordCounter();
}

function updateWordCounter() {
  const words = [1,2,3].map(n => document.getElementById('word-'+n)?.value?.trim()).filter(Boolean);
  const counter = document.getElementById('word-counter');
  if (counter) counter.textContent = words.length + ' / 3 words';
}

function getWordSummary() {
  return [1,2,3]
    .map(n => document.getElementById('word-'+n)?.value?.trim().toLowerCase())
    .filter(Boolean);
}

function clearWordSummary() {
  [1,2,3].forEach(n => {
    const el = document.getElementById('word-'+n);
    if (el) el.value = '';
  });
  updateWordCounter();
}

function checkSubmit() {
  const val = document.getElementById('modal-title-input')?.value?.trim();
  const btn = document.getElementById('modal-submit');
  if (btn) btn.disabled = !val;
}

document.getElementById('modal-title-input').addEventListener('input', checkSubmit);

function submitLog() {
  const title = document.getElementById('modal-title-input').value.trim();
  if (!title) return;
  const posters = { movie:'🎬', tv:'📺' };
  const entry = {
    id: 'my-' + Date.now(),
    user: S.user?.displayName || 'You',
    avatar: S.user?.avatar || 'Y',
    avatarColor: S.user?.avatarColor || '#E84830',
    type: S.modalType,
    title,
    year: new Date().getFullYear(),
    status: S.modalStatus,
    rating: S.modalRating,
    review: document.getElementById('modal-review').value.trim() || null,
    wordSummary: getWordSummary(),
    genre: document.getElementById('modal-genre')?.value?.trim() || 'General',
    poster: posters[S.modalType],
    time: 'Just now',
    likes: 0,
  };

  S.feed = [entry, ...S.feed];
  S.myEntries = [entry, ...S.myEntries];
  store.set('feed', S.feed);
  store.set('myEntries', S.myEntries);

  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-title-input').value = '';
  document.getElementById('modal-review').value = '';
  const genreEl = document.getElementById('modal-genre');
  if (genreEl) genreEl.value = '';
  clearWordSummary();

  renderFeed();
  renderProfile();
  showToast(`"${title}" logged!`);
  showScreen('feed');
}

// ── Toast ──────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Notifications ──────────────────────────────────────────────
const NOTIFICATIONS = [
  { id:'n1', type:'like',    actor:'Elena M.', actorAvatar:'E', actorColor:'#E84830', target:'Dune: Part Two', time:'2m ago', read:false },
  { id:'n2', type:'follow',  actor:'Dev K.',   actorAvatar:'D', actorColor:'#3CC68A', target:null, time:'18m ago', read:false },
  { id:'n3', type:'like',    actor:'Yuki T.',  actorAvatar:'Y', actorColor:'#4A90D9', target:'Past Lives', time:'1h ago', read:false },
  { id:'n4', type:'comment', actor:'Marco V.', actorAvatar:'M', actorColor:'#3CC68A', target:'Shōgun', comment:'Completely agree — episode 5 is a masterpiece.', time:'3h ago', read:true },
  { id:'n5', type:'like',    actor:'Pia S.',   actorAvatar:'P', actorColor:'#7B6EF5', target:'Orbital', time:'Yesterday', read:true },
  { id:'n6', type:'follow',  actor:'Rosa B.',  actorAvatar:'R', actorColor:'#C8A96E', target:null, time:'Yesterday', read:true },
  { id:'n7', type:'comment', actor:'Elena M.', actorAvatar:'E', actorColor:'#E84830', target:'Dune: Part Two', comment:'The final act genuinely left me speechless.', time:'2 days ago', read:true },
];

const NOTIF_ICONS  = { like:'♥', follow:'◉', comment:'◻' };
const NOTIF_COLORS = { like:'#E84830', follow:'#3CC68A', comment:'#4A90D9' };

function getNotifText(n) {
  if (n.type === 'like')    return `liked your log of <b>${n.target}</b>`;
  if (n.type === 'follow')  return 'started following you';
  if (n.type === 'comment') return `commented on your log of <b>${n.target}</b>`;
  return '';
}

function renderNotifications() {
  const unread = NOTIFICATIONS.filter(n => !n.read).length;
  document.getElementById('notifications-content').innerHTML = `
    <div class="notif-header">
      <button onclick="goBack()" style="display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;width:70px">
        <span style="color:var(--red);font-size:18px">←</span>
        <span style="color:var(--dim);font-family:var(--mono);font-size:9px;letter-spacing:1.5px">BACK</span>
      </button>
      <span class="notif-header-title">NOTIFICATIONS${unread > 0 ? ` <span class="notif-badge">${unread}</span>` : ''}</span>
      ${unread > 0 ? `<button class="notif-mark-all" onclick="markAllNotifRead()">ALL READ</button>` : '<span style="width:70px"></span>'}
    </div>
    ${NOTIFICATIONS.length === 0 ? `<div class="empty-state" style="padding:60px 40px">
      <div class="empty-emoji" style="font-size:48px">🔔</div>
      <div class="empty-title" style="font-size:16px">All caught up</div>
      <div class="empty-hint" style="font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--tiny);margin-top:6px;text-align:center">When friends like or comment on your logs, they'll appear here</div>
    </div>` : ''}
    ${NOTIFICATIONS.map(n => `
      <div class="notif-row ${n.read ? '' : 'unread'}" id="notif-${n.id}" onclick="markNotifRead('${n.id}')">
        <div class="notif-dot-col">${!n.read ? '<div class="notif-dot"></div>' : ''}</div>
        <div class="notif-type-icon" style="background:${NOTIF_COLORS[n.type]}18;border-color:${NOTIF_COLORS[n.type]}44;color:${NOTIF_COLORS[n.type]}">${NOTIF_ICONS[n.type]}</div>
        <div class="avatar" style="width:34px;height:34px;flex-shrink:0;font-size:13px;background:${n.actorColor}22;border:2px solid ${n.actorColor}66;color:${n.actorColor};display:flex;align-items:center;justify-content:center;border-radius:50%;font-family:var(--serif);font-weight:bold">${n.actorAvatar}</div>
        <div class="notif-content">
          <div class="notif-text"><span class="notif-actor">${n.actor}</span> <span class="notif-body">${getNotifText(n)}</span></div>
          ${n.comment ? `<div class="notif-comment">"${n.comment}"</div>` : ''}
          <div class="notif-time">${n.time}</div>
        </div>
      </div>
    `).join('')}
    <div class="pb-safe"></div>
  `;
}

function markNotifRead(id) {
  const n = NOTIFICATIONS.find(n => n.id === id);
  if (n) n.read = true;
  renderNotifications();
}

function markAllNotifRead() {
  NOTIFICATIONS.forEach(n => n.read = true);
  renderNotifications();
}

// ── Stats ───────────────────────────────────────────────────────
function renderStats() {
  const entries = S.myEntries.length > 0 ? S.myEntries : [
    { type:'movie',   status:'finished', rating:5, wordSummary:['epic','stunning','overwhelming'] },
    { type:'tv',      status:'finished', rating:4, wordSummary:['gripping','excellent','tense'] },
    { type:'movie',   status:'finished', rating:4, wordSummary:['quiet','devastating','beautiful'] },
  { type:'tv',      status:'finished', rating:3, wordSummary:['fine','predictable','watchable'] },
    { type:'movie',   status:'finished', rating:5, wordSummary:['masterpiece','bold','unforgettable'] },
  { type:'movie',   status:'watching', rating:null, wordSummary:[] },
    { type:'tv',      status:'want to watch', rating:null, wordSummary:[] },
  ];

  const finished   = entries.filter(e => e.status === 'finished');
  const watching   = entries.filter(e => e.status === 'watching');
  const wantTo     = entries.filter(e => e.status === 'want to watch');
  const byType = { movie:0, tv:0 };
  const ratingDist = [0,0,0,0,0];
  const wordFreq   = {};

  for (const e of finished) {
    byType[e.type] = (byType[e.type]||0) + 1;
    if (e.rating >= 1 && e.rating <= 5) ratingDist[e.rating-1]++;
    for (const w of (e.wordSummary||[])) { if (w) wordFreq[w] = (wordFreq[w]||0)+1; }
  }

  const rated = finished.filter(e => e.rating);
  const avg   = rated.length ? (rated.reduce((s,e) => s+e.rating,0)/rated.length).toFixed(1) : null;
  const maxType   = Math.max(...Object.values(byType), 1);
  const maxRating = Math.max(...ratingDist, 1);
  const BAR_MAX   = 160;

  const topWords = Object.entries(wordFreq)
    .sort((a,b) => b[1]-a[1]).slice(0,6);

  const streak = Math.min(entries.length, 7);

  const typeColors = { movie:'#E84830', tv:'#4A90D9' };
  const typeLabels = { movie:'Films', tv:'Series' };

  document.getElementById('stats-content').innerHTML = `
    <div class="notif-header">
      <button onclick="goBack()" style="display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;width:70px">
        <span style="color:var(--red);font-size:18px">←</span>
        <span style="color:var(--dim);font-family:var(--mono);font-size:9px;letter-spacing:1.5px">BACK</span>
      </button>
      <span class="notif-header-title">MY STATS</span>
      <span style="width:70px"></span>
    </div>

    <div class="stats-section-title">OVERVIEW</div>
    <div class="stats-card-row">
      <div class="stats-card"><div class="stats-val">${finished.length}</div><div class="stats-lbl">LOGGED</div></div>
      <div class="stats-card"><div class="stats-val">${watching.length}</div><div class="stats-lbl">WATCHING</div></div>
      <div class="stats-card"><div class="stats-val">${wantTo.length}</div><div class="stats-lbl">WANT TO</div></div>
    </div>

    ${avg ? `<div class="stats-avg-row">
      <span class="stats-avg-lbl">AVERAGE RATING</span>
      <div class="stats-avg-right">
        <span class="stats-avg-val">${avg}</span>
        <span style="font-size:14px;letter-spacing:1px">${[1,2,3,4,5].map(s=>`<span style="color:${s<=Math.round(avg)?'#C8A96E':'var(--border)'}">★</span>`).join('')}</span>
      </div>
    </div>` : ''}

    <div class="stats-section-title">BY TYPE</div>
    <div class="stats-bars-card">
      ${Object.entries(byType).map(([type,count]) => `
        <div class="stats-bar-row">
          <span class="stats-bar-label">${typeLabels[type]}</span>
          <div class="stats-bar-track">
            <div class="stats-bar-fill" style="width:${count>0?(count/maxType)*BAR_MAX:2}px;background:${typeColors[type]}"></div>
          </div>
          <span class="stats-bar-count" style="color:${typeColors[type]}">${count}</span>
        </div>
      `).join('')}
    </div>

    <div class="stats-section-title">RATING BREAKDOWN</div>
    <div class="stats-bars-card">
      ${[5,4,3,2,1].map(star => `
        <div class="stats-bar-row">
          <span class="stats-bar-label" style="color:var(--gold)">${'★'.repeat(star)}</span>
          <div class="stats-bar-track">
            <div class="stats-bar-fill" style="width:${ratingDist[star-1]>0?(ratingDist[star-1]/maxRating)*BAR_MAX:2}px;background:#f59e0b;opacity:${0.4+(star/5)*0.6}"></div>
          </div>
          <span class="stats-bar-count" style="color:var(--gold)">${ratingDist[star-1]}</span>
        </div>
      `).join('')}
    </div>

    ${topWords.length ? `
    <div class="stats-section-title">YOUR TOP WORDS</div>
    <div class="stats-words-grid">
      ${topWords.map(([word,count]) => `
        <div class="stats-word-chip">
          <span class="stats-word">${word}</span>
          <span class="stats-word-count">${count}×</span>
        </div>
      `).join('')}
    </div>` : ''}

    <div class="stats-section-title">LOGGING STREAK</div>
    <div class="streak-card">
      <div class="streak-num">${streak}</div>
      <div class="streak-lbl">day streak</div>
      <div class="streak-dots">
        ${[...Array(7)].map((_,i) => `<div class="streak-dot ${i<streak?'active':''}"></div>`).join('')}
      </div>
    </div>
    <div class="pb-safe"></div>
  `;
}


// ── Boot ───────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
